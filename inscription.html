<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Cars</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="header">
      <h2 class="logo">LUXURY CARS</h2>

      <nav>
        <ul class="navbar">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="#">Marques</a></li>
          <li><a href="#">Voitures</a></li>
          <li><a href="#">reservation</a></li>
          <li><a href="#social">Contact</a></li>
        </ul>
      </nav>

      <a href="connexion.html" class="login-btn">Connexion</a>
    </header>
    <video autoplay muted loop id="video1">
      <source src="video/4.mp4" type="video/mp4" />
    </video>
    <div class="wrapped-body">
      <form action="" id="login-form" class="wrapped">
        <h1>Inscription</h1>
        <div class="info-box">
          <input type="text" name="username" placeholder="username" required />
          <i class="bx bxs-user"></i>
        </div>
        <div class="info-box">
          <input type="email" name="email" placeholder="email" required />
          <i class="bx bxs-envelope"></i>
        </div>
        <div class="info-box">
          <input type=password name="password" placeholder="mot de passe" minlength="8" required />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <div class="connexion-btn">
          <button type="submit">sign in</button>
        </div>
        <div class="or-divider">OU</div>
        <div class="register">
          <p>vous avez un compte ? <a href="connexion.html"> connexion</a></p>
        </div>
        <div class="social">
          <a href=""><i class="bx bxl-google"></i></a>
          <a href=""><i class="bx bxl-facebook-circle"></i></a>
          <a href=""><i class="bx bxl-github"></i></a>
          <a href=""><i class="bx bxl-linkedin"></i></a>
        </div>
      </form>
    </div>
    <script src="javascript/auth.js"></script>
  </body>
</html>
